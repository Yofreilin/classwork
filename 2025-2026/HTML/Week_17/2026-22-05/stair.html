<!DOCTYPE html>
<html lang="en">
    <head>
        <style>
            .box{
                border-top: 10px solid black;
                border-right: 10px solid black;
            }
            table{
                border-collapse: collapse;
            }
            td,th{
                padding: 10px;
            }
        </style>
        <meta charset="UTF-8">
        <title>STAIR</title>
    </head>
    <h1>STAIR Problem Solving Technique</h1>
    <body>
    <table>
        <tr>
            <th class="box">S</th>
            <td colspan="5"><mark>State</mark> the problem</td>
        </tr>
        <tr>
            <td></td>
            <th class="box">T</th>
            <td colspan="4">Gather your <mark>tools</mark></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <th class="box">A</th>
            <td colspan="3">Decide on <mark>approach</mark> to solve the problem</td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <th class="box">I</th>
            <td colspan="2"><mark> Implement</mark> your approach</td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <th class="box">R</th>
            <td><mark>Refine</mark> your approach based on your attempts</td>
        </tr>

    </table>


    </body>
</html>
